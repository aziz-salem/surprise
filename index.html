<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال مهم جداً</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 { color: #d63384; font-size: 2.5rem; }
        .buttons { margin-top: 50px; position: relative; width: 100%; height: 200px; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: absolute;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            left: 40%;
            transform: translateX(-50%);
            z-index: 100;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            right: 40%;
            transform: translateX(50%);
        }

        .cat-img { width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW80bm9uamR6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" class="cat-img" alt="Cute Cat">
        <h1 id="question">هل انتي ابنت عزو الشيباني؟</h1>
        
        <div class="buttons">
            <button id="yesBtn">نعم</button>
            <button id="noBtn">لا</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        let yesSize = 1.2;

        // حركة هروب زر "لا"
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            
            // تكبير زر "نعم" كلما حاول الضغط على "لا"
            yesSize += 0.2;
            yesBtn.style.transform = `translateX(-50%) scale(${yesSize})`;
        });

        // ماذا يحدث عند الضغط على "نعم"
        yesBtn.addEventListener('click', () => {
            document.body.innerHTML = `
                <div style="text-align:center;">
                    <h1>شطوره! كنت عارف أنكِ ذكية 😉</h1>
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueW80bm9uamR6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/Ti6lO6B8o0rYyvW7S3/giphy.gif">
                </div>
            `;
        });
    </script>
</body>
</html>
